# Gradle 全局属性配置文件

# AndroidX 相关配置：使用 AndroidX 库替代旧版 Support 库
android.useAndroidX=true

# 启用 Jetifier：自动将第三方库中的 Support 库依赖转换为 AndroidX
android.enableJetifier=true

# JVM 内存配置：为 Gradle 守护进程分配更多内存
org.gradle.jvmargs=-Xmx4G

# 启用 Gradle 守护进程：加快后续构建速度
org.gradle.daemon=true

# 启用并行构建：加快多模块项目构建速度
org.gradle.parallel=true

# 配置 Gradle 缓存：启用构建缓存以加速重复构建
org.gradle.caching=true
